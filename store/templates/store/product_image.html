{% if has_image %}
<img src="{{ product.image.url }}" alt="{{ product.name }}" loading="lazy" 
     style="width:100%;height:100%;object-fit:cover;"
     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
<div class="img-placeholder" style="display:none;">
{% else %}
<div class="img-placeholder" style="display:flex;">
{% endif %}
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;width:100%;height:100%;">
        <i class="fas {{ icon }}" style="font-size:3rem;color:rgba(201,168,76,0.45);"></i>
        <span style="font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:3px;color:rgba(201,168,76,0.3);text-transform:uppercase;">VISIONGEAR</span>
    </div>
</div>
